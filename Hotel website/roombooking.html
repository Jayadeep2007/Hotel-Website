<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book your room at Royal Palace Hotel easily using our room booking form.">
    <meta name="keywords" content="Room Booking, Hotel Booking, Royal Palace Hotel">
    <title>Royal Palace Hotel | Room Booking</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h2 class="logo">Royal Palace Hotel</h2>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="rooms.html">Rooms</a></li>
            <li><a href="roomprices.html">Room Prices</a></li>
            <li><a href="facilities.html">Facilities</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="roombooking.html" class="active">Book Room</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="page-banner">
    <h1>Room Booking</h1>
    <p>Book your comfortable stay with us.</p>
</section>

<section class="booking-form">
    <h2>Book Your Room</h2>

    <form onsubmit="return validateForm()">

        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name">

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter your phone number">

        <label for="checkin">Check-In Date</label>
        <input type="date" id="checkin">

        <label for="checkout">Check-Out Date</label>
        <input type="date" id="checkout">

        <label for="room">Room Type</label>
        <select id="room">
            <option value="">Select Room Type</option>
            <option>Deluxe Room</option>
            <option>Premium Room</option>
            <option>Suite Room</option>
            <option>Double Room</option>
        </select>

        <label for="guests">Number of Guests</label>
        <input type="number" id="guests" placeholder="Enter number of guests">

        <label for="message">Special Request</label>
        <textarea id="message" rows="5" placeholder="Write your special request"></textarea>

        <button type="submit" class="btn">Submit Booking</button>

    </form>
</section>

<footer>
    <p>&copy; 2026 Royal Palace Hotel. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
